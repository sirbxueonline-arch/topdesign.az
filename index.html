<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TopDesign.az — Tezliklə</title>

  <meta property="og:image" content="logo.png" />
  <meta property="og:type" content="website" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'Inter', sans-serif;
      background: #f3f2ee;
      color: #1c1a19;
      overflow-x: hidden;
    }

    /* Wave canvas — sits behind everything */
    #waves {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
      opacity: 0;
      transition: opacity 2.8s ease 0.5s;
    }

    /* Blobs */
    .blob-1 {
      position: fixed; width: 640px; height: 640px; border-radius: 50%;
      background: rgba(200,48,42,0.06); filter: blur(150px);
      top: -260px; right: -260px;
      pointer-events: none; z-index: 1;
      animation: drift 15s ease-in-out infinite;
    }
    .blob-2 {
      position: fixed; width: 380px; height: 380px; border-radius: 50%;
      background: rgba(210,180,130,0.09); filter: blur(120px);
      bottom: -140px; left: -120px;
      pointer-events: none; z-index: 1;
      animation: drift 20s ease-in-out infinite reverse;
    }
    @keyframes drift {
      0%,100% { transform: translate(0,0); }
      50%      { transform: translate(-18px,22px); }
    }




    /* Page */
    .page {
      position: relative; z-index: 5;
      min-height: 100vh;
      display: flex; flex-direction: column;
      opacity: 0;
      animation: fadein 0.8s ease 0.1s forwards;
    }
    @keyframes fadein { to { opacity: 1; } }

    /* Header */
    .header {
      padding: clamp(32px,5vh,60px) clamp(60px,7vw,100px) 0;
      display: flex;
      justify-content: center;
    }
    .logo-clip {
      width: min(60vw,600px);
      aspect-ratio: 3.5;
      overflow: hidden; line-height: 0;
      opacity: 0;
      animation: logo-in 1s cubic-bezier(0.25,1,0.5,1) 0.5s forwards;
    }
    @keyframes logo-in {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .logo-clip img {
      width: 100%; height: auto; display: block;
      margin-top: -35%; mix-blend-mode: multiply;
    }

    /* Hero */
    .hero {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px 20px; gap: 16px;
    }


    .hero-text {
      font-size: clamp(28px,5.2vw,64px);
      font-weight: 200;
      letter-spacing: 0.58em;
      color: #2a2826;
      text-transform: lowercase;
      white-space: nowrap;
      text-align: center;
      width: 100%;
      opacity: 0;
      animation: fadein 0.5s ease 0.8s forwards;
    }
    .cursor {
      display: inline-block;
      width: 2px; height: 0.78em;
      background: #c8302a;
      vertical-align: middle;
      margin-left: 2px; margin-bottom: 3px;
      animation: cur-blink 0.65s step-end infinite;
    }
    .cursor.hidden { display: none; }
    @keyframes cur-blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    .hero-sub {
      font-size: clamp(9px,1vw,11px); font-weight: 400;
      letter-spacing: 0.38em; text-transform: uppercase;
      color: #aba9a5;
      opacity: 0; transform: translateY(8px);
      transition: opacity 1s ease, transform 1s ease;
    }
    .hero-sub.show { opacity: 1; transform: translateY(0); }

    .hero-rule {
      width: 0; height: 1px;
      background: rgba(200,48,42,0.5);
      transition: width 0.8s ease 0.2s;
    }
    .hero-rule.show { width: 28px; }

    /* Footer */
    .footer {
      position: relative;
      border-top: 1px solid rgba(0,0,0,0.1);
      display: flex; justify-content: center;
      padding: clamp(18px,2.5vh,26px) clamp(60px,7vw,100px) clamp(44px,7vh,64px);
      opacity: 0; transform: translateY(6px);
      transition: opacity 1s ease, transform 1s ease;
    }
    .footer.show { opacity: 1; transform: translateY(0); }
    .footer::before {
      content: '';
      position: absolute; top: -5px; left: 50%;
      width: 1px; height: 10px;
      background: #c8302a; transform: translateX(-50%);
    }

    .f-left { display: flex; flex-direction: row; align-items: center; gap: 28px; }
    .f-label { display: none; }
    .f-left a {
      display: flex; align-items: center; gap: 8px;
      color: #888; text-decoration: none;
      font-size: 12.5px; font-weight: 300; letter-spacing: 0.02em;
      transition: color 0.2s;
    }
    .f-left a:hover { color: #1c1a19; }
    .f-left svg { width: 12px; height: 12px; fill: currentColor; opacity: 0.65; flex-shrink: 0; }

    .copyright {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      font-size: 9px; letter-spacing: 0.45em;
      color: #c2bfba; text-transform: uppercase;
      white-space: nowrap; z-index: 5;
      opacity: 0; animation: fadein 1s ease 4.5s forwards;
    }
    .copyright a { color: inherit; text-decoration: none; }

    @media (max-width: 640px) {
      .header { padding: 32px 28px 0; }
      .logo-clip { width: min(78vw,400px); }
      .footer { grid-template-columns: 1fr; padding: 20px 28px 60px; }
      .f-right { align-items: flex-start; }
      .v-accent, .monogram { display: none; }
    }
  </style>
</head>
<body>

  <canvas id="waves"></canvas>

  <div class="blob-1"></div>
  <div class="blob-2"></div>

  <div class="page">

    <header class="header">
      <div class="logo-clip">
        <img src="logo.png" alt="Top Design" />
      </div>
    </header>

    <main class="hero">
      <p class="hero-text" id="tez-text"><span class="cursor" id="cursor"></span></p>
      <p class="hero-sub" id="tagline">memarlıq dizayn studiya</p>
      <div class="hero-rule" id="hero-rule"></div>
    </main>

    <footer class="footer" id="contact-row">
      <div class="f-left">
        <p class="f-label">Əlaqə</p>
        <a href="https://instagram.com/topdesign.az" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
          @topdesign.az
        </a>
        <a href="mailto:hello@topdesign.az">
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
          hello@topdesign.az
        </a>
      </div>
    </footer>

  </div>

  <div class="copyright">&copy; 2011 <a href="http://topdesign.az">topdesign.az</a></div>

  <script>
    /* ── Wave canvas ── */
    (function () {
      const canvas = document.getElementById('waves');
      const ctx    = canvas.getContext('2d');
      let w, h;

      function resize() {
        w = canvas.width  = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      // Subtle background lines + bold featured waves in logo palette
      // y=position ratio, amp=amplitude(px), f=frequency, s=speed, p=phase, c=colour, lw=lineWidth
      const WAVES = [
        // Fine background lines
        { y:.04, amp:11, f:.0036, s:.22, p:0.0, c:'rgba(42,40,38,0.048)', lw:.60 },
        { y:.14, amp:15, f:.0028, s:.18, p:2.3, c:'rgba(42,40,38,0.040)', lw:.55 },
        { y:.24, amp: 9, f:.0042, s:.26, p:1.1, c:'rgba(42,40,38,0.036)', lw:.55 },
        { y:.57, amp:13, f:.0033, s:.23, p:2.9, c:'rgba(42,40,38,0.042)', lw:.60 },
        { y:.72, amp:17, f:.0027, s:.19, p:0.6, c:'rgba(42,40,38,0.040)', lw:.55 },
        { y:.86, amp:12, f:.0039, s:.25, p:2.5, c:'rgba(42,40,38,0.038)', lw:.55 },
        { y:.96, amp:10, f:.0034, s:.17, p:1.5, c:'rgba(42,40,38,0.035)', lw:.55 },

        // Bold featured waves — wide, slow, elegant
        { y:.34, amp:42, f:.0022, s:.13, p:1.9, c:'rgba(200,48,42,0.13)', lw:1.4 }, // red
        { y:.47, amp:48, f:.0018, s:.10, p:3.5, c:'rgba(42,40,38,0.095)', lw:1.3 }, // dark
        { y:.62, amp:38, f:.0025, s:.15, p:0.3, c:'rgba(200,48,42,0.08)', lw:1.1 }, // red
        { y:.79, amp:34, f:.0029, s:.12, p:2.7, c:'rgba(42,40,38,0.080)', lw:1.1 }, // dark
      ];

      let t = 0;
      function draw() {
        ctx.clearRect(0, 0, w, h);

        WAVES.forEach(wv => {
          const baseY = h * wv.y;
          ctx.beginPath();
          ctx.strokeStyle = wv.c;
          ctx.lineWidth   = wv.lw;
          ctx.lineJoin    = 'round';
          for (let x = 0; x <= w; x += 2) {
            const y = baseY
              + Math.sin(x * wv.f + t * wv.s + wv.p) * wv.amp
              + Math.sin(x * wv.f * 1.9 + t * wv.s * 0.6 + wv.p + 1.3) * (wv.amp * 0.25);
            x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          }
          ctx.stroke();
        });

        // Soft edge fade — waves emerge from and recede into the sides
        const fade = w * 0.09;
        const eg = ctx.createLinearGradient(0, 0, w, 0);
        eg.addColorStop(0,        'rgba(243,242,238,1)');
        eg.addColorStop(fade / w, 'rgba(243,242,238,0)');
        eg.addColorStop(1 - fade / w, 'rgba(243,242,238,0)');
        eg.addColorStop(1,        'rgba(243,242,238,1)');
        ctx.fillStyle = eg;
        ctx.fillRect(0, 0, w, h);

        t += 0.016;
        requestAnimationFrame(draw);
      }
      draw();

      // Fade in after a short delay so it appears to "emerge"
      requestAnimationFrame(() => { canvas.style.opacity = 1; });
    })();

    /* ── Typing ── */
    const word = "tezliklə";
    const el   = document.getElementById('tez-text');
    const cur  = document.getElementById('cursor');
    let i = 0;

    setTimeout(() => {
      function typeChar() {
        if (i < word.length) {
          el.insertBefore(document.createTextNode(word[i++]), cur);
          setTimeout(typeChar, 85 + Math.random() * 95);
        } else {
          cur.classList.add('hidden');
          setTimeout(() => document.getElementById('tagline').classList.add('show'),     300);
          setTimeout(() => document.getElementById('hero-rule').classList.add('show'),   500);
          setTimeout(() => document.getElementById('contact-row').classList.add('show'), 750);
        }
      }
      typeChar();
    }, 900);
  </script>
</body>
